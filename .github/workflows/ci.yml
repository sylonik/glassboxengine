name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  recommendation-quality:
    name: Recommendation Quality
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p artifacts
      - run: pnpm -F @glassbox/agents eval:report --json-out ../../artifacts/recommendation-eval-fixtures.json
      - run: pnpm -F @glassbox/agents eval:report:sample
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recommendation-quality
          path: artifacts/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, recommendation-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-at-least-32-chars"
          BETTER_AUTH_URL: "http://localhost:3000"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Automated production deploy ──────────────────────────────────────────
  # Runs only on push to main, and only after `build` (which transitively
  # requires lint, typecheck, test and recommendation-quality to pass).
  # Auth is keyless via Workload Identity Federation — no service-account keys.
  # App secrets live in Secret Manager and are already wired onto the Cloud Run
  # service, so the deploy only swaps the image; config is preserved.
  deploy:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: glassbox-engine
      REGION: us-central1
      REGISTRY: us-central1-docker.pkg.dev/glassbox-engine/glassbox
      SERVICE: glassbox-web
      WIF_PROVIDER: projects/573736938351/locations/global/workloadIdentityPools/github-pool/providers/github-provider
      DEPLOY_SA: glassbox-cicd@glassbox-engine.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@v4
      - id: auth
        name: Authenticate to GCP (keyless / WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build & push web image
        run: |
          IMAGE="${REGISTRY}/glassbox-web:${GITHUB_SHA::12}"
          docker build -t "$IMAGE" -t "${REGISTRY}/glassbox-web:latest" .
          docker push "$IMAGE"
          docker push "${REGISTRY}/glassbox-web:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --quiet
      - name: Output service URL
        run: |
          echo "Deployed $IMAGE"
          gcloud run services describe "$SERVICE" --region "$REGION" \
            --project "$PROJECT_ID" --format="value(status.url)"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: glassbox
          POSTGRES_PASSWORD: glassbox
          POSTGRES_DB: glassbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glassbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          DATABASE_URL: "postgresql://glassbox:glassbox@localhost:5432/glassbox_test"
          REDIS_URL: "redis://localhost:6379"
          CLICKHOUSE_URL: "http://localhost:8123"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: glassbox
          POSTGRES_PASSWORD: glassbox
          POSTGRES_DB: glassbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glassbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e:prepare
        env:
          DATABASE_URL: "postgresql://glassbox:glassbox@localhost:5432/glassbox_test"
          BETTER_AUTH_SECRET: "test-secret-at-least-32-characters-long"
          BETTER_AUTH_URL: "http://127.0.0.1:3000"
          GOOGLE_API_KEY: "test-key"
          ENABLE_TEST_AUTH: "true"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
          REDIS_URL: "redis://localhost:6379"
          CLICKHOUSE_URL: "http://localhost:8123"
          CLICKHOUSE_DATABASE: "glassbox_test"
          OTEL_SERVICE_NAME: "glassbox-engine-test"
          LOG_LEVEL: "warn"
      - run: pnpm e2e
        env:
          DATABASE_URL: "postgresql://glassbox:glassbox@localhost:5432/glassbox_test"
          BETTER_AUTH_SECRET: "test-secret-at-least-32-characters-long"
          BETTER_AUTH_URL: "http://127.0.0.1:3000"
          GOOGLE_API_KEY: "test-key"
          ENABLE_TEST_AUTH: "true"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
          REDIS_URL: "redis://localhost:6379"
          CLICKHOUSE_URL: "http://localhost:8123"
          CLICKHOUSE_DATABASE: "glassbox_test"
          OTEL_SERVICE_NAME: "glassbox-engine-test"
          LOG_LEVEL: "warn"
